<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" th:href="@{/assets/images/logo/logo.png}" type="image/png" />

  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">

  <script th:src="@{/js/render.js}" defer></script>
  <script th:src="@{/js/util.js}" defer></script>
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
  <script th:src="@{/js/components/modals.js}" defer></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">

      <div id="header"></div>

      <main class="main-content">
        <input type="text" id="searchBar" class="input-field" placeholder="search by doctor name" />

        <div class="filter-wrapper">
          <select id="filterTime" class="select-dropdown">
            <option value="">Sort by time</option>
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
          <select id="filterSpecialty" class="select-dropdown">
            <option value="">All specialties</option>
            <option value="cardiology">Cardiology</option>
            <option value="dermatology">Dermatology</option>
            <option value="pediatrics">Pediatrics</option>
            <option value="general">General Practice</option>
          </select>
        </div>

        <div id="content"></div>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
  </div>

  <script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
  <script type="module" th:src="@{/js/components/doctorCard.js}" defer></script>
</body>
</html>
