<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Role</title>

  <!-- FIXED PATHS -->
  <link rel="icon" href="assets/images/logo/logo.png">
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- JS -->
  <script src="js/util.js" defer></script>
  <script src="js/render.js" defer></script>
  <script src="js/components/header.js" defer></script>
  <script src="js/components/footer.js" defer></script>
</head>

<body>

  <div class="container">
    <div class="wrapper">

      <div id="header"></div>

      <main class="main-content">
        <h2>Select Your Role</h2>

        <button id="adminLogin" class="adminBtn">Admin</button>
        <button id="patientLogin" class="adminBtn">Patient</button>
        <button id="doctorLogin" class="adminBtn">Doctor</button>
      </main>

      <div id="footer"></div>

    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- BUTTON LOGIC -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      document.getElementById("adminLogin").addEventListener("click", function () {
        window.location.href = "admin/login.html";
      });

      document.getElementById("doctorLogin").addEventListener("click", function () {
        window.location.href = "doctor/login.html";
      });

      document.getElementById("patientLogin").addEventListener("click", function () {
        window.location.href = "patient/login.html";
      });

    });
  </script>

</body>
</html>
