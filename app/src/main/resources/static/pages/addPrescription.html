<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Prescription</title>
  <link rel="stylesheet" href="../assets/css/addPrescription.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../js/util.js" defer></script>
</head>
<body>
  <div class="container">
    <h2>Add Prescription</h2>
    <form id="prescriptionForm">
      <input class="input-field" type="text" id="medication" placeholder="Medication" required />
      <input class="input-field" type="text" id="dosage" placeholder="Dosage" required />
      <textarea class="input-field" id="notes" placeholder="Notes"></textarea>
      <button type="submit" class="dashboard-btn">Save Prescription</button>
    </form>
  </div>
  <script type="module" src="../js/addPrescription.js" defer></script>
</body>
</html>
