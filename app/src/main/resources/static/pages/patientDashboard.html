<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
  <link rel="icon" href="../assets/images/logo/logo.png" type="image/png" />

  <link rel="stylesheet" href="../assets/css/adminDashboard.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/patientDashboard.css" />

  <script src="../js/render.js" defer></script>
  <script src="../js/util.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/components/modals.js"></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">

      <div id="header"></div>

      <main class="main-content">
        <input type="text" id="searchBar" class="searchBar input-field" placeholder="Search Bar for custom output" />

        <div class="filter-wrapper">
          <select class="filter-select select-dropdown" id="filterTime">
            <option value="">Any time</option>
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
          <select class="filter-select select-dropdown" id="filterSpecialty">
            <option value="">All specialties</option>
            <option value="cardiology">Cardiology</option>
            <option value="dermatology">Dermatology</option>
            <option value="pediatrics">Pediatrics</option>
            <option value="general">General Practice</option>
          </select>
        </div>

        <div id="content"></div>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="../js/patientDashboard.js" defer></script>
</body>
</html>
