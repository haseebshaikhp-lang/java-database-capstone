<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Record</title>
  <link rel="stylesheet" href="../assets/css/doctorDashboard.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../js/render.js" defer></script>
  <script src="../js/util.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <main class="main-content">
        <table id="recordTable">
          <thead><tr><th>Date</th><th>Doctor</th><th>Medication</th><th>Dosage</th><th>Notes</th></tr></thead>
          <tbody id="recordTableBody"></tbody>
        </table>
      </main>
      <div id="footer"></div>
    </div>
  </div>
  <script type="module" src="../js/patientRecordServices.js" defer></script>
</body>
</html>
