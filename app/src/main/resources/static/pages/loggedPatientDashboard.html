<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dashboard</title>
  <link rel="stylesheet" href="../assets/css/adminDashboard.css">
  <link rel="stylesheet" href="../assets/css/patientDashboard.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../js/render.js" defer></script>
  <script src="../js/util.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/components/modals.js"></script>
</head>
<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <main class="main-content">
        <input type="text" id="searchBar" class="input-field" placeholder="Search doctors" />
        <div id="content"></div>
      </main>
      <div id="footer"></div>
    </div>
  </div>
  <div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
  </div>
  <script type="module" src="../js/loggedPatient.js" defer></script>
</body>
</html>
