<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Appointment</title>
  <link rel="stylesheet" href="../assets/css/updateAppointment.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../js/util.js" defer></script>
</head>
<body>
  <div class="container">
    <h2>Update Appointment</h2>
    <form id="updateAppointmentForm">
      <input class="input-field" type="date" id="newDate" required />
      <input class="input-field" type="time" id="newTime" required />
      <button type="submit" class="dashboard-btn">Save Changes</button>
    </form>
  </div>
  <script type="module" src="../js/updateAppointment.js" defer></script>
</body>
</html>
